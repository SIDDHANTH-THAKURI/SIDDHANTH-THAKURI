<svg width="100%" viewBox="0 0 900 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6E56CF;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#6E56CF;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#38bdf8"/>
      <stop offset="80%" style="stop-color:#a78bfa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Main line -->
  <rect x="0" y="14" width="900" height="1" fill="url(#dl)">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Center diamond -->
  <polygon points="450,9 457,15 450,21 443,15" fill="#0d1117" stroke="#38bdf8" stroke-width="1.2" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <!-- Side dots -->
  <circle cx="320" cy="15" r="2" fill="#6E56CF" opacity="0.7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="15" r="2" fill="#a78bfa" opacity="0.7" filter="url(#glow)">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="15" r="1.5" fill="#38bdf8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="15" r="1.5" fill="#6E56CF" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Moving pulse -->
  <circle cx="0" cy="15" r="3" fill="#38bdf8" opacity="0.8" filter="url(#glow)">
    <animate attributeName="cx" values="0;900;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
