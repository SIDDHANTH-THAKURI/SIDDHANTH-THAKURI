name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib

    steps:
      - uses: actions/checkout@v3

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        with:
          SETTING_JSON: |
            {
              "githubUserName": "SIDDHANTH-THAKURI",
              "contributionColorArray": ["#0d1117", "#1a1f6e", "#3730a3", "#6E56CF", "#a78bfa"],
              "backgroundColor": "#0d1117",
              "wDayAndMonthLabel": { "color": "#8b949e" },
              "settingFileName": "profile-night-rainbow"
            }

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Auto update 3D contribution graph" || exit 0
          git push
